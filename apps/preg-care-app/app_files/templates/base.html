<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PregCare - {% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
  </head>

  <body>
    <nav id="mainNav" class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">PregCare <i class="fa fa-heartbeat"></i></a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavBar">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavBar">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item px-2">
              <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item px-2">
              <a class="nav-link" href="/baby">Baby</a>
            </li>
            <li class="nav-item px-2">
              <a class="nav-link" href="/memo">Memo</a>
            </li>
            <li class="nav-item px-2">
              <a class="nav-link" href="/nutri">Nutri</a>
            </li>
            <li class="nav-item px-2">
              <a class="nav-link" href="/org">Organizer</a>
            </li>
            <li class="nav-item px-2">
              <a class="nav-link" href="/pills">Pills</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="footer text-white p-4 mt-5" id="footer">
      <div class="container">
        <div class="row">
          <div class="col-md-6">
            <small>
              © 2026 PregCare<br>
              Rock Piryt
            </small>
          </div>

          <div class="col-md-6 text-md-end">
            <small>
              <a href="https://github.com/RockPiryt/Pregnant_pills" target="_blank" class="text-white text-decoration-none">
                View source on GitHub
              </a>
            </small>
          </div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
