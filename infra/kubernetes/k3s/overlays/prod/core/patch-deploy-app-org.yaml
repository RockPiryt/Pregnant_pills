apiVersion: apps/v1
kind: Deployment
metadata:
  name: preg-org-app
spec:
  replicas: 2
  template:
    spec:
      nodeSelector:
        node-role: worker
      containers:
        - name: preg-org-container
          image: 340507401402.dkr.ecr.eu-west-1.amazonaws.com/deploy-preg-app:preg-org-app-latest
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "300Mi"