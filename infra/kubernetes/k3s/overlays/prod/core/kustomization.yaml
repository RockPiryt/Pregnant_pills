resources:
  - ../../../base
  - ns-preg-prod.yaml

namePrefix: prod-
namespace: preg-prod

patches:
  - path: patch-deploy-app-baby.yaml
    target:
      kind: Deployment
      name: preg-baby-app

  - path: patch-deploy-app-memo.yaml
    target:
      kind: Deployment
      name: preg-memo-app
  
  - path: patch-deploy-app-nutri.yaml
    target:
      kind: Deployment
      name: preg-nutri-app
  
  - path: patch-deploy-app-org.yaml
    target:
      kind: Deployment
      name: preg-org-app

  - path: patch-deploy-app-pills.yaml
    target:
      kind: Deployment
      name: preg-pills-app
  
  - path: patch-deploy-app-care.yaml
    target:
      kind: Deployment
      name: preg-care-app


generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: preg-secrets
    envs:
      - .env

configMapGenerator:
- name: preg-config
  literals:
    - APP_ENV=production
    - FLASK_APP=wsgi.py