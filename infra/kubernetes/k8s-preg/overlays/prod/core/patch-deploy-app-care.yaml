apiVersion: apps/v1
kind: Deployment
metadata:
  name: preg-care-app
spec:
  replicas: 2
  template:
    spec:
      nodeSelector:
        node-role: worker
      containers:
        - name: preg-care-container
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "300Mi"