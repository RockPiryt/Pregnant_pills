apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns-sa
  namespace: preg-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns-cr
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "watch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns-viewer-crb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns-cr
subjects:
  - kind: ServiceAccount
    name: external-dns-sa
    namespace: preg-prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns-deploy
  namespace: preg-prod
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns-d
  template:
    metadata:
      labels:
        app: external-dns-d
    spec:
      serviceAccountName: external-dns-sa
      containers:
        - name: external-dns-con
          image: registry.k8s.io/external-dns/external-dns:v0.16.1
          args:
            - --source=service
            - --source=ingress
            - --provider=aws
            - --aws-zone-type=public
            - --registry=txt
            - --txt-owner-id=my-hostedzone-identifier
            - --policy=upsert-only
            - --domain-filter=paulinakimak.com
            - --log-level=info
            - --log-format=text
      securityContext:
        fsGroup: 65534 # For ExternalDNS to be able to read Kubernetes and AWS token files